name: Update Gold Dashboard

on:
  schedule:
    # NOTE: GitHub cron is UTC and tends to DROP on-the-hour schedules under load,
    # so these are deliberately a few minutes past the hour.
    # 08:07 Asia/Bangkok = 01:07 UTC — early spot/FX refresh
    - cron: "7 1 * * *"
    # 09:20 Asia/Bangkok = 02:20 UTC — catches the GTA morning price (round 1 ~09:03)
    - cron: "20 2 * * *"
    # 15:30 Asia/Bangkok = 08:30 UTC — afternoon catch of the finalised GTA price
    - cron: "30 8 * * *"
  workflow_dispatch: {}   # allow manual "Run workflow" from the Actions tab

permissions:
  contents: write

concurrency:
  group: gold-dashboard
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh dashboard
        run: python scraper.py

      - name: Commit and push if changed
        run: |
          git config user.name "gold-dashboard-bot"
          git config user.email "actions@github.com"
          git add index.html data.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily gold dashboard refresh ($(TZ=Asia/Bangkok date '+%Y-%m-%d %H:%M'))"
            git push
          fi
